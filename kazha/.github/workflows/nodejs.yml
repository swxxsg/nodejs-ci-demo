name: Node.js CI

on:
  push:
    branches: [ main ] # 新仓库默认分支是main，不是master
  issues:
    types: [ opened ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x] # 升级为长期支持版Node20，废弃12.x

    steps:
      # 升级到v4最新稳定版，指定代码拉到根目录
      - uses: actions/checkout@v4
        with:
          path: .

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm' # 缓存依赖，加速构建

      - name: Install dependencies
        run: npm i

      # 增加判断，无build脚本时跳过不报错
      - name: Build project
        if: ${{ exists('package.json') }}
        run: npm run build --if-present
